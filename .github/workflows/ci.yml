name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Pobierz zależności
        run: go mod tidy
      - name: Vet (analiza statyczna)
        run: go vet ./...
      - name: Testy
        run: go test ./... -v
      - name: Build
        run: go build ./...

  worker:
    name: Worker (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalacja zależności
        run: pip install "psycopg[binary]" requests
      - name: Sprawdzenie składni
        run: python -m py_compile worker.py
