services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ti
      POSTGRES_PASSWORD: ti
      POSTGRES_DB: ti
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ti"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    environment:
      API_PORT: "8080"
      DATABASE_URL: "postgres://ti:ti@db:5432/ti?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./worker
    environment:
      DATABASE_URL: "postgres://ti:ti@db:5432/ti?sslmode=disable"
      VT_API_KEY: ${VT_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  recon-worker:
    build: ./worker
    command: ["python", "-u", "recon_worker.py"]
    environment:
      DATABASE_URL: "postgres://ti:ti@db:5432/ti?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
